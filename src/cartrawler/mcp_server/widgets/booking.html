<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed</title>
  <style>
    :root {
      --bg: #f0fdf4;
      --card-bg: #ffffff;
      --card-border: #bbf7d0;
      --text: #14532d;
      --subtext: #6c757d;
      --accent: #16a34a;
      --row-bg: #f8fffe;
      --row-border: #d1fae5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #052e16;
        --card-bg: #0a3622;
        --card-border: #14532d;
        --text: #dcfce7;
        --subtext: #86efac;
        --accent: #4ade80;
        --row-bg: #0d3d20;
        --row-border: #14532d;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }
    .check-banner {
      text-align: center;
      padding: 20px 0 14px;
    }
    .check-icon { font-size: 44px; margin-bottom: 8px; }
    .check-title { font-size: 20px; font-weight: 800; color: var(--accent); }
    .check-sub { font-size: 13px; color: var(--subtext); margin-top: 4px; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      margin-top: 14px;
    }
    .card-header {
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--row-border);
      background: var(--row-bg);
      font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--subtext); }
    .detail-value { font-weight: 600; color: var(--text); text-align: right; max-width: 60%; word-break: break-all; }
    .booking-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      background: var(--row-border);
      padding: 2px 8px;
      border-radius: 6px;
      color: var(--accent);
      cursor: pointer;
    }
    .total-row {
      background: var(--accent);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 800;
    }
    .points-badge {
      background: #fef3c7;
      color: #92400e;
      padding: 8px 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
    }
    .action-row {
      padding: 14px 16px;
      display: flex;
      gap: 10px;
    }
    .btn-outline {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--card-border);
      border-radius: 9px;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .loading { text-align: center; padding: 32px; color: var(--subtext); }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">Loading booking details…</div>
  </div>

  <script type="module">
    const root = document.getElementById('app');

    function fmt(n) { return parseFloat(n||0).toLocaleString('en-IN', {maximumFractionDigits:2}); }

    function render(data) {
      const b = data.booking || data;
      if (!b || !b.booking_id) {
        root.innerHTML = `<div class="loading">${data.message || 'Booking details unavailable.'}</div>`;
        return;
      }
      const pts = b.loyalty_points_earned || 0;
      const disc = parseFloat(b.discount_applied || 0);
      const discRow = disc > 0
        ? `<div class="detail-row"><span class="detail-label">🏷️ Discount Applied</span><span class="detail-value" style="color:var(--accent)">−₹${fmt(disc)}</span></div>`
        : '';
      const ptsRow = pts > 0
        ? `<div class="points-badge">⭐ You earned +${pts} CarTrawler loyalty points!</div>`
        : '';

      root.innerHTML = `
        <div class="check-banner">
          <div class="check-icon">✅</div>
          <div class="check-title">Booking Confirmed!</div>
          <div class="check-sub">Your car is reserved. Details below.</div>
        </div>
        <div class="card">
          <div class="card-header">🚗 ${b.car_model || 'Your Car'} · ${b.car_type || ''}</div>
          <div class="detail-row">
            <span class="detail-label">📋 Booking ID</span>
            <span class="booking-id" onclick="navigator.clipboard?.writeText('${b.booking_id}')" title="Click to copy">${b.booking_id}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">📍 Pickup</span>
            <span class="detail-value">${b.pickup_location || '—'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">📅 Pickup Date</span>
            <span class="detail-value">${b.travel_date || '—'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">🔄 Return Date</span>
            <span class="detail-value">${b.return_date || '—'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">⏱️ Duration</span>
            <span class="detail-value">${b.rental_days || '—'} day(s)</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">💳 Payment</span>
            <span class="detail-value">${b.payment_method || '—'} · ${b.payment_status || '—'}</span>
          </div>
          ${discRow}
          <div class="total-row">
            <span>💰 Total Paid</span>
            <span>₹${fmt(b.total_price)}</span>
          </div>
          ${ptsRow}
          <div class="action-row">
            <button class="btn-outline" onclick="navigator.clipboard?.writeText('${b.booking_id}');this.textContent='✅ Copied!'">
              📋 Copy Booking ID
            </button>
          </div>
        </div>`;
    }

    async function init() {
      try {
        const { App } = await import('https://esm.sh/@modelcontextprotocol/ext-apps@latest');
        const app = new App({ name: 'CarTrawler Booking', version: '1.0.0' });
        app.ontoolresult = (res) => render(res.structuredContent || {});
        app.connect();
      } catch (_) {
        window.addEventListener('message', ({ data }) => {
          const sc = data?.structuredContent;
          if (sc?.booking || sc?.booking_id) render(sc);
          else if (data?.booking || data?.booking_id) render(data);
        });
        try { window.parent.postMessage({ type: 'mcp-ui-ready', widget: 'booking' }, '*'); } catch(_) {}
      }
    }
    init();
  </script>
</body>
</html>
