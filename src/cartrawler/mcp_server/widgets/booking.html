<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Booking Confirmed</title>
<style>
:root{
  --bg:#f0fdf4;--surface:#fff;--border:#bbf7d0;--text:#14532d;--sub:#6c757d;
  --green:#16a34a;--green2:#dcfce7;--row:#f8fffe;--total-bg:#16a34a;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#051e0f;--surface:#0a3622;--border:#14532d;--text:#dcfce7;--sub:#86efac;
    --green:#4ade80;--green2:#052e16;--row:#0d3d20;--total-bg:#15803d;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:14px}
.banner{text-align:center;padding:20px 0 14px}
.icon{font-size:44px;margin-bottom:8px}
.title{font-size:20px;font-weight:800;color:var(--green)}
.sub{font-size:13px;color:var(--sub);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:14px}
.card-hdr{background:var(--green);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--row);font-size:13px}
.row:last-child{border-bottom:none}
.lbl{color:var(--sub)}
.val{font-weight:600;text-align:right;max-width:60%;word-break:break-all}
.bid{font-family:monospace;font-size:12px;background:var(--green2);padding:2px 8px;border-radius:6px;color:var(--green);cursor:pointer}
.total-row{background:var(--total-bg);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;font-size:16px;font-weight:800}
.pts{background:#fef3c7;color:#92400e;padding:8px 16px;text-align:center;font-size:13px;font-weight:600}
.actions{padding:12px 16px;display:flex;gap:10px}
.btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:background .15s}
.btn:hover{background:var(--green2)}
.loading{text-align:center;padding:32px;color:var(--sub)}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading booking details…</div></div>
<script>
var _id=0,_cb={};
function send(method,params,cb){
  var id=++_id;if(cb)_cb[id]=cb;
  var msg={jsonrpc:'2.0',method:method,id:id};
  if(params!==undefined)msg.params=params;
  try{window.parent.postMessage(JSON.stringify(msg),'*');}catch(e){}
}
window.addEventListener('message',function(ev){
  var data;try{data=typeof ev.data==='string'?JSON.parse(ev.data):ev.data;}catch(e){return;}
  if(!data)return;
  if(data.id&&_cb[data.id]){_cb[data.id](data.result);delete _cb[data.id];}
  // ChatGPT MCP Apps bridge notification (correct method name)
  if(data.method==='ui/notifications/tool-result'){
    var sc=(data.params||{}).structuredContent;
    if(sc&&(sc.booking||sc.booking_id))return render(sc);
  }
  // Fallback: legacy method names and direct pushes
  if(data.method==='notifications/tools/call_result'||data.method==='tool_result'){
    var sc2=(data.params||data).structuredContent;
    if(sc2&&(sc2.booking||sc2.booking_id))return render(sc2);
  }
  if(data.structuredContent&&(data.structuredContent.booking||data.structuredContent.booking_id))return render(data.structuredContent);
  if(data.booking||data.booking_id)return render(data);
});
send('initialize',{protocolVersion:'2024-11-05',capabilities:{},clientInfo:{name:'CarTrawler Booking Widget',version:'1.0.0'}},function(){
  send('notifications/initialized');
});

function fmt(n){return parseFloat(n||0).toLocaleString('en-IN',{maximumFractionDigits:2});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(data){
  var b=data.booking||data;
  var root=document.getElementById('app');
  if(!b||!b.booking_id){root.innerHTML='<div class="loading">'+(data.message||'Booking details unavailable.')+'</div>';return;}
  var pts=b.loyalty_points_earned||0;
  var disc=parseFloat(b.discount_applied||0);
  var bid=esc(b.booking_id);
  var discRow=disc>0?'<div class="row"><span class="lbl">🏷️ Discount</span><span class="val" style="color:var(--green)">−₹'+fmt(disc)+'</span></div>':'';
  var ptsRow=pts>0?'<div class="pts">⭐ You earned +'+pts+' CarTrawler loyalty points!</div>':'';
  root.innerHTML=
    '<div class="banner"><div class="icon">✅</div><div class="title">Booking Confirmed!</div><div class="sub">Your car is reserved.</div></div>'
    +'<div class="card">'
    +'<div class="card-hdr">🚗 '+(esc(b.car_model)||'Your Car')+' · '+(esc(b.car_type)||'')+'</div>'
    +'<div class="row"><span class="lbl">📋 Booking ID</span><span class="bid" onclick="cp(\''+bid+'\')" title="Tap to copy">'+bid+'</span></div>'
    +'<div class="row"><span class="lbl">📍 Pickup</span><span class="val">'+esc(b.pickup_location||'—')+'</span></div>'
    +'<div class="row"><span class="lbl">📅 Pickup Date</span><span class="val">'+esc(b.travel_date||'—')+'</span></div>'
    +'<div class="row"><span class="lbl">🔄 Return Date</span><span class="val">'+esc(b.return_date||'—')+'</span></div>'
    +'<div class="row"><span class="lbl">⏱️ Duration</span><span class="val">'+(b.rental_days||'—')+' day(s)</span></div>'
    +'<div class="row"><span class="lbl">💳 Payment</span><span class="val">'+(esc(b.payment_method||'—'))+' · '+(esc(b.payment_status||'—'))+'</span></div>'
    +discRow
    +'<div class="total-row"><span>💰 Total Paid</span><span>₹'+fmt(b.total_price)+'</span></div>'
    +ptsRow
    +'<div class="actions"><button class="btn" id="cpbid" onclick="cpBid(\''+bid+'\')">📋 Copy Booking ID</button></div>'
    +'</div>';
}

function cp(code){try{navigator.clipboard.writeText(code);}catch(e){}}
function cpBid(bid){
  cp(bid);
  var b=document.getElementById('cpbid');
  if(b){b.textContent='✅ Copied!';setTimeout(function(){b.textContent='📋 Copy Booking ID';},2000);}
}
</script>
</body>
</html>
