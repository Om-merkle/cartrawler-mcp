<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CarTrawler Cars</title>
<style>
:root{
  --bg:#f5f5f7;--surface:#fff;--border:#e0e0e0;--text:#1d1d1f;--sub:#6e6e73;
  --accent:#0066cc;--accent2:#e8f1fb;--green:#1a7f37;--green2:#dafbe1;
  --yellow:#7d5a00;--yellow2:#fff3c4;--red:#d1242f;--shadow:0 2px 12px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--surface:#2c2c2e;--border:#3a3a3c;--text:#f5f5f7;--sub:#aeaeb2;
    --accent:#4da3ff;--accent2:#1a2d4a;--green:#3fb950;--green2:#0d2d1a;
    --yellow:#f0c060;--yellow2:#2d2200;--red:#f85149;--shadow:0 2px 12px rgba(0,0,0,.4);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:12px;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hdr-title{font-size:14px;font-weight:700}
.hdr-count{font-size:12px;color:var(--sub)}
/* Carousel */
.rail{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory}
.rail::-webkit-scrollbar{height:3px}
.rail::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* Card */
.card{flex:0 0 210px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;scroll-snap-align:start;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.car-name{font-size:13px;font-weight:700;line-height:1.3;flex:1}
.price{background:var(--accent);color:#fff;padding:4px 9px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0}
.vendor{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--accent2);color:var(--accent);font-weight:500}
.tag.driver{background:var(--green2);color:var(--green)}
.rating{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px}
.stars{color:#f0c040}
.book-btn{display:block;width:100%;padding:9px 0;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;transition:opacity .15s;margin-top:auto}
.book-btn:hover{opacity:.85}
/* Offers bar */
.offers{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
.offers-lbl{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:8px}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.chips::-webkit-scrollbar{height:3px}
.chip{flex:0 0 auto;background:var(--yellow2);color:var(--yellow);padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;border:none;transition:filter .15s}
.chip:hover{filter:brightness(1.1)}
.chip.copied{background:var(--green2);color:var(--green)}
/* Empty / loading */
.empty,.loading{text-align:center;padding:32px 16px;color:var(--sub)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
</style>
</head>
<body>
<div id="app"><div class="loading">🚗 Loading CarTrawler cars…</div></div>
<script>
/* ── CarTrawler Cars Widget
   Data sources (in priority order):
   1. window.openai.toolResponseMetadata  — ChatGPT MCP Apps bridge (_meta)
   2. ui/notifications/tool-result        — postMessage from ChatGPT bridge (structuredContent)
   3. Legacy postMessage method names     — fallback
──────────────────────────────────────────────────────────────── */

// 1. ChatGPT Apps bridge: data is in window.openai.toolResponseMetadata
//    This maps to the _meta field returned by the tool.
function tryOpenAIBridge(){
  try{
    var meta=window.openai&&window.openai.toolResponseMetadata;
    if(meta&&meta.cars!==undefined){render(meta);return true;}
  }catch(e){}
  return false;
}

// 2. postMessage listener (ui/notifications/tool-result from ChatGPT bridge)
window.addEventListener('message',function(ev){
  var data;
  try{data=typeof ev.data==='string'?JSON.parse(ev.data):ev.data;}
  catch(e){return;}
  if(!data)return;

  // ChatGPT MCP Apps bridge notification (correct method name)
  if(data.method==='ui/notifications/tool-result'){
    var sc=(data.params||{}).structuredContent;
    if(sc&&sc.cars!==undefined)return render(sc);
    // _meta may also come via toolResponseMetadata after this notification
    setTimeout(tryOpenAIBridge,50);
  }

  // Fallback: legacy method names and direct pushes
  if(data.method==='notifications/tools/call_result'||data.method==='tool_result'){
    var sc2=(data.params||data).structuredContent;
    if(sc2&&sc2.cars!==undefined)return render(sc2);
  }
  if(data.structuredContent&&data.structuredContent.cars!==undefined)return render(data.structuredContent);
  if(data.cars!==undefined)return render(data);
});

// Try immediately on load (data may already be set by ChatGPT before DOMContentLoaded)
if(!tryOpenAIBridge()){
  // Also try after a short delay in case ChatGPT injects window.openai asynchronously
  setTimeout(tryOpenAIBridge,200);
}

/* ── URL helpers ──────────────────────────────────────────────── */
var INT_URLS={
  'Dubai':'https://www.cartrawler.com/ct/en-gb/car-rental/uae/dubai/',
  'London':'https://www.cartrawler.com/ct/en-gb/car-rental/united-kingdom/london/',
  'New York':'https://www.cartrawler.com/ct/en-gb/car-rental/united-states/new-york/',
  'Los Angeles':'https://www.cartrawler.com/ct/en-gb/car-rental/united-states/los-angeles/',
  'Singapore':'https://www.cartrawler.com/ct/en-gb/car-rental/singapore/singapore/',
  'Paris':'https://www.cartrawler.com/ct/en-gb/car-rental/france/paris/',
  'Sydney':'https://www.cartrawler.com/ct/en-gb/car-rental/australia/sydney/',
  'Bangkok':'https://www.cartrawler.com/ct/en-gb/car-rental/thailand/bangkok/',
  'Amsterdam':'https://www.cartrawler.com/ct/en-gb/car-rental/netherlands/amsterdam/',
  'Tokyo':'https://www.cartrawler.com/ct/en-gb/car-rental/japan/tokyo/'
};
function ctUrl(city){return INT_URLS[city]||'https://www.cartrawler.com/ct/en-gb/car-rental/india/'+(city||'india').toLowerCase().replace(/\s+/g,'-')+'/';}
function fmt(n){return parseInt(n||0).toLocaleString('en-IN');}
function bool(v){return v===true||v==='true'||v==='TRUE';}

/* ── Render ───────────────────────────────────────────────────── */
function render(data){
  var cars=data.cars||[];
  var city=data.city||'';
  var total=data.total||cars.length;
  var offers=data.offers||[];
  var url=ctUrl(city);
  var root=document.getElementById('app');

  if(!cars.length){
    root.innerHTML='<div class="empty"><div class="empty-icon">🚗</div><div class="empty-title">No cars found in '+(city||'this city')+'</div><div style="font-size:13px;margin-bottom:16px">Try CarTrawler.com for full availability</div><a href="'+url+'" target="_blank" class="book-btn" style="display:inline-block;width:auto;padding:9px 20px">Search on CarTrawler →</a></div>';
    return;
  }

  var cards=cars.slice(0,8).map(function(c){
    var model=c.car_model||c.car_type||'Car';
    var type=c.car_type||'';
    var vendor=c.vendor||'';
    var loc=c.pickup_location||city;
    var ppd=int(c.price_per_day);
    var pph=int(c.price_per_hour);
    var rating=c.rating?parseFloat(c.rating).toFixed(1):null;
    var reviews=c.total_reviews||0;
    var fuel=c.fuel_type||'';
    var trans=c.transmission||'';
    var seats=c.seating_capacity||5;
    var driver=bool(c.with_driver);
    var insured=bool(c.insurance_included);
    var id=c.car_id||'';
    var priceHr=pph?'<div style="font-size:10px;color:var(--sub)">₹'+fmt(pph)+'/hr</div>':'';
    var ratingHtml=rating?'<div class="rating"><span class="stars">★</span>'+rating+' <span>('+reviews+')</span></div>':'';
    return '<div class="card">'
      +'<div class="card-top"><div class="car-name">'+esc(model)+'</div><div class="price">₹'+fmt(ppd)+'/day</div></div>'
      +priceHr
      +'<div class="vendor">📍 '+esc(vendor)+' · '+esc(loc)+'</div>'
      +'<div class="tags">'
      +(type?'<span class="tag">'+esc(type)+'</span>':'')
      +(fuel?'<span class="tag">'+esc(fuel)+'</span>':'')
      +(trans?'<span class="tag">'+esc(trans)+'</span>':'')
      +'<span class="tag">👤 '+seats+' seats</span>'
      +(driver?'<span class="tag driver">✅ With Driver</span>':'<span class="tag">🚗 Self-drive</span>')
      +(insured?'<span class="tag">🛡️ Insured</span>':'')
      +'</div>'
      +ratingHtml
      +'<a href="'+url+'" target="_blank" class="book-btn">Book on CarTrawler →</a>'
      +'</div>';
  }).join('');

  var offerHtml='';
  if(offers.length){
    var chips=offers.map(function(o,i){
      var code=o.coupon_code||'';
      var pct=o.discount_percentage;
      var maxD=parseInt(o.max_discount_amount||0);
      var disc=pct?parseInt(pct)+'% off':'₹'+maxD.toLocaleString('en-IN')+' off';
      return '<button class="chip" id="chip'+i+'" onclick="copyCode(\''+esc(code)+'\','+i+')" title="'+esc(o.description||'')+'">'+esc(code)+' · '+disc+'</button>';
    }).join('');
    offerHtml='<div class="offers"><div class="offers-lbl">🏷️ Discount codes — tap to copy</div><div class="chips">'+chips+'</div></div>';
  }

  root.innerHTML='<div class="hdr"><span class="hdr-title">🚗 CarTrawler · '+esc(city)+'</span><span class="hdr-count">'+cars.slice(0,8).length+' of '+total+' cars</span></div>'
    +'<div class="rail">'+cards+'</div>'
    +offerHtml;
}

function copyCode(code,i){
  try{navigator.clipboard.writeText(code);}catch(e){}
  var btn=document.getElementById('chip'+i);
  if(btn){btn.textContent='✅ Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent=code+' copied';btn.classList.remove('copied');},2000);}
}

function int(v){return Math.round(parseFloat(v)||0);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
