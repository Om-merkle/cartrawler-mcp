services:
  - type: web
    name: cartrawler-mcp
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install uv && uv sync --frozen --no-dev"
    startCommand: "uv run uvicorn cartrawler.main:app --host 0.0.0.0 --port $PORT"
    autoDeploy: true
    envVars:
      - key: PYTHONPATH
        value: src
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: MCP_SERVER_NAME
        value: cartrawler-mcp
      - key: MCP_SERVER_HOST
        value: "0.0.0.0"
      - key: VECTOR_STORE_TABLE
        value: knowledge_base_embeddings
      - key: EMBEDDING_DIMENSION
        value: "1536"
